services:
  - type: web
    name: gps-terrain-stl
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --threads 1 → only one STL build runs at a time (no memory pile-up).
    # --max-requests 3 → recycle the worker every few requests to release any
    #   leaked memory back to the OS. --max-requests-jitter spreads recycles.
    startCommand: gunicorn app:app --workers 1 --threads 1 --timeout 600 --max-requests 3 --max-requests-jitter 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_DEBUG
        value: "0"
    autoDeploy: true
